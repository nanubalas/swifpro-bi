{% extends "base.html" %}
{% block title %}Delete Tax Code - SwifPro BI{% endblock %}
{% block body %}
<div class="card card-soft">
  <div class="card-body p-4">
    <h3 class="fw-bold">Delete Tax Code</h3>
    <p class="text-muted">Delete <b>{{ tax.code }}</b> ({{ tax.name }})?</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="/tax-codes/">Cancel</a>
        <button class="btn btn-danger" type="submit">Delete</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
