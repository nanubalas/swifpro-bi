{% extends "base.html" %}
{% block title %}Delete Location - SwifPro BI{% endblock %}

{% block body %}
<div class="card card-soft">
  <div class="card-body p-4">
    <h3 class="fw-bold">Delete Location</h3>
    <p class="text-muted mb-4">
      Are you sure you want to delete <b>{{ location.name }}</b>?
      If inventory exists at this location, deletion may be blocked.
    </p>

    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="/locations/">Cancel</a>
        <button class="btn btn-danger" type="submit">Delete</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
