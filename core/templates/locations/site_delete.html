{% extends "base.html" %}
{% block title %}Delete Site - SwifPro BI{% endblock %}
{% block back_url %}{% url 'site_list' %}{% endblock %}
{% block body %}
<div class="card"><div class="card-body p-4">
  <h2 class="fw-bold mb-3">Delete site</h2>
  <p>Delete <strong>{{ site.name }}</strong>? Locations under it will be kept but unassigned from any site.</p>
  <form method="post">
    {% csrf_token %}
    <div class="d-flex gap-2">
      <button class="btn btn-danger" type="submit">Delete site</button>
      <a class="btn btn-outline-secondary" href="{% url 'site_list' %}">Cancel</a>
    </div>
  </form>
</div></div>
{% endblock %}
