{% extends "base.html" %}

<div class="row justify-content-center">

    <div class="card-soft p-5 text-center">
      <div class="d-inline-flex align-items-center justify-content-center mb-3 mx-auto"
           style="width:64px;height:64px;border-radius:18px;font-size:1.8rem;color:#fff;background:linear-gradient(135deg,#ef4444,#f97316);">

      <h2 class="fw-bold mb-2">403 - Access denied</h2>

      <div class="d-flex gap-2 justify-content-center">
        <a href="/" class="btn btn-primary"><i class="bi bi-house me-1"></i> My dashboard</a>
        <a href="/logout/" class="btn btn-outline-secondary">Sign out</a>

    </div>
  </div>
</div>
