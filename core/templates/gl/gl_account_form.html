{% extends "base.html" %}
{% block title %}GL Account - SwifPro BI{% endblock %}
{% block body %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h2 class="fw-bold mb-1">{% if mode == "create" %}Create{% else %}Edit{% endif %} GL Account</h2>
  </div>
  <a class="btn btn-outline-secondary" href="/gl/accounts/">Back</a>
</div>

<div class="card card-soft">
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-md-3"><label class="form-label">Code</label>{{ form.code }}</div>
        <div class="col-md-6"><label class="form-label">Name</label>{{ form.name }}</div>
        <div class="col-md-3"><label class="form-label">Type</label>{{ form.type }}</div>
        <div class="col-md-3">
          <label class="form-label">Active</label>
          <div class="form-check mt-2">{{ form.is_active }} <label class="form-check-label">Enabled</label></div>
        </div>
      </div>
      <div class="d-flex justify-content-end gap-2 mt-4">
        <a class="btn btn-outline-secondary" href="/gl/accounts/">Cancel</a>
        <button class="btn btn-primary" type="submit">Save</button>
      </div>
    </form>
  </div>
</div>

<script>
  document.querySelectorAll("input, select, textarea").forEach(el => {
    if (el.type === "checkbox") el.classList.add("form-check-input");
    else el.classList.add("form-control");
  });
</script>
{% endblock %}
