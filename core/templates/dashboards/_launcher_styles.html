{# Shared launcher-card styling for the dashboard preview and the module pages,
   so both render an identical card design from one source. #}
<style>
  .launch-card {
    display: flex; flex-direction: column; gap: .25rem;
    border-radius: var(--skn-radius); border: 1px solid var(--skn-border);
    background: var(--skn-surface); padding: 1.1rem; height: 100%;
    text-decoration: none; color: var(--skn-text);
    transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  }
  .launch-card:hover {
    transform: translateY(-3px); box-shadow: var(--skn-shadow-lg);
    border-color: color-mix(in srgb, var(--skn-brand) 35%, var(--skn-border));
    color: var(--skn-text);
  }
  .launch-icon {
    width: 46px; height: 46px; border-radius: 13px; margin-bottom: .35rem;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 1.35rem; background: var(--skn-brand-soft); color: var(--skn-brand);
  }
  .launch-card:hover .launch-icon { background: var(--skn-brand); color: #fff; }
  /* Gold accent reserved for Finance & Reports/BI cards */
  .launch-icon.gold { background: var(--skn-gold-soft); color: var(--skn-gold); }
  .launch-card:hover .launch-icon.gold { background: var(--skn-gold); color: #fff; }
  .launch-section-title { font-size: .74rem; text-transform: uppercase; letter-spacing: .09em; font-weight: 700; color: var(--skn-muted); }
  /* Experimental / Advisory (and similar) badge on a launcher card */
  .launch-badge {
    align-self: flex-start; margin-top: .15rem; font-size: .64rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .04em; padding: .12rem .45rem;
    border-radius: 999px; background: var(--skn-surface-2); color: var(--skn-muted);
    border: 1px solid var(--skn-border);
  }
</style>
