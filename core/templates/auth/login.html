{% extends "base.html" %}
{% load static %}
{% block title %}Login - SwifPro BI{% endblock %}

{% block body %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="col-md-6 col-lg-5 col-xl-4">
    <div class="card-soft p-4 p-md-5">
      <div class="text-center mb-4">
        <img src="{% static 'img/logo.png' %}" alt="SwifPro BI" class="mb-2 logo-light" style="width:300px;max-width:92%;height:auto;">
        <img src="{% static 'img/logo-dark.png' %}" alt="SwifPro BI" class="mb-2 logo-dark" style="width:300px;max-width:92%;height:auto;">
        <p class="text-muted mt-2 mb-0 fs-6">Business intelligence, simplified!</p>
      </div>

      {% if form.errors %}
        <div class="alert alert-danger d-flex align-items-center">
          <i class="bi bi-exclamation-circle-fill me-2"></i>
          <div>Invalid username or password.</div>
        </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" autofocus required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" id="loginPassword" class="form-control" required>
            <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                    aria-label="Show password" aria-pressed="false" title="Show password">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <button class="btn btn-primary w-100 py-2" type="submit">
          <i class="bi bi-box-arrow-in-right me-1"></i> Sign in
        </button>
      </form>

      <script>
        // Show / hide the password (eye toggle).
        (function () {
          var btn = document.getElementById("togglePassword");
          var input = document.getElementById("loginPassword");
          if (!btn || !input) return;
          btn.addEventListener("click", function () {
            var show = input.type === "password";
            input.type = show ? "text" : "password";
            btn.querySelector("i").className = show ? "bi bi-eye-slash" : "bi bi-eye";
            btn.setAttribute("aria-pressed", String(show));
            var label = show ? "Hide password" : "Show password";
            btn.setAttribute("aria-label", label);
            btn.setAttribute("title", label);
            input.focus();
          });
        })();
      </script>

      <div class="text-muted small text-center mt-4">
        Don’t have an account? <a href="{% url 'request_access' %}" class="text-decoration-none">Request access</a>.
      </div>
    </div>
  </div>
</div>
{% endblock %}
