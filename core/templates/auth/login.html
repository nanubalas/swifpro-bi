{% extends "base.html" %}
{% block title %}Login - SKUNOW{% endblock %}

{% block body %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="col-md-6 col-lg-5 col-xl-4">
    <div class="card-soft p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center mb-3"
             style="width:58px;height:58px;border-radius:16px;font-size:1.6rem;color:#fff;background:linear-gradient(135deg,var(--skn-brand),var(--skn-accent));box-shadow:0 10px 24px -8px rgba(var(--skn-brand-rgb),.7);">
          <i class="bi bi-boxes"></i>
        </div>
        <h3 class="fw-bold mb-1">Sign in to SKUNOW</h3>
        <p class="text-muted mb-0">Know your SKU better.</p>
      </div>

      {% if form.errors %}
        <div class="alert alert-danger d-flex align-items-center">
          <i class="bi bi-exclamation-circle-fill me-2"></i>
          <div>Invalid username or password.</div>
        </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" autofocus required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" required>
          </div>
        </div>

        <button class="btn btn-primary w-100 py-2" type="submit">
          <i class="bi bi-box-arrow-in-right me-1"></i> Sign in
        </button>
      </form>

      <div class="text-muted small text-center mt-4">
        Don’t have an account? Ask an admin to create one.
      </div>
    </div>
  </div>
</div>
{% endblock %}
