{% extends "base.html" %}
{% block title %}Issue AR Invoice - SwifPro BI{% endblock %}
{% block body %}
<div class="card card-soft">
  <div class="card-body p-4">
    <h3 class="fw-bold">Issue Invoice</h3>
    <p class="text-muted mb-4">Issue <b>{{ inv.invoice_number }}</b> and post journal entry?</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="/ar/invoices/{{ inv.id }}/">Cancel</a>
        <button class="btn btn-success" type="submit">Issue & Post to GL</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
