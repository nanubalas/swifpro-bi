{% extends "base.html" %}
{% block title %}Post Supplier Invoice - SwifPro BI{% endblock %}
{% block body %}
<div class="card card-soft">
  <div class="card-body p-4">
    <h3 class="fw-bold">Post Supplier Invoice</h3>
    <p class="text-muted mb-4">
      Post <b>{{ inv.invoice_number }}</b> to GL? This creates AP journal entry.
    </p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="/invoices/{{ inv.id }}/">Cancel</a>
        <button class="btn btn-success" type="submit">Post to GL</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
