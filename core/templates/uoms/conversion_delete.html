{% extends "base.html" %}
{% block title %}Delete Conversion - SwifPro BI{% endblock %}
{% block body %}
<div class="card card-soft">
  <div class="card-body p-4">
    <h3 class="fw-bold">Delete Conversion</h3>
    <p class="text-muted mb-4">Delete this conversion? This cannot be undone.</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="/uom-conversions/">Cancel</a>
        <button class="btn btn-danger" type="submit">Delete</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
