{% extends "base.html" %}
{% block title %}Delete UOM - SwifPro BI{% endblock %}
{% block body %}
<div class="card card-soft">
  <div class="card-body p-4">
    <h3 class="fw-bold">Delete UOM</h3>
    <p class="text-muted mb-4">Delete <b>{{ uom.code }}</b>? If referenced by products/BOMs, deletion may be blocked.</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="/uoms/">Cancel</a>
        <button class="btn btn-danger" type="submit">Delete</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
