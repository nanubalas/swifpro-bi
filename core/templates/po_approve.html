{% extends "base.html" %}
{% block title %}Approve PO {{ po.po_number }} - SwifPro BI{% endblock %}
{% block body %}
<div class="card card-soft">
  <div class="card-body p-4">
    <h3 class="fw-bold mb-2">Approve Purchase Order</h3>
    <p class="text-muted">
      PO <b>{{ po.po_number }}</b> for supplier <b>{{ po.supplier.name }}</b> requires approval.
    </p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="/po/{{ po.id }}/">Cancel</a>
        <button class="btn btn-success" type="submit">Approve PO</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
