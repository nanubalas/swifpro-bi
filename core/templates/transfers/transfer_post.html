{% extends "base.html" %}
{% block title %}Post Transfer - SwifPro BI{% endblock %}
{% block body %}
<div class="card card-soft">
  <div class="card-body p-4">
    <h3 class="fw-bold mb-2">Post Transfer</h3>
    <p class="text-muted mb-4">
      Posting <b>{{ transfer.transfer_number }}</b> will move stock from <b>{{ transfer.from_location.name }}</b> to <b>{{ transfer.to_location.name }}</b>.
    </p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="/transfers/{{ transfer.id }}/">Cancel</a>
        <button class="btn btn-success" type="submit">Post Transfer</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
