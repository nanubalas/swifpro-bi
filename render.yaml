# Render blueprint for the SwifPro BI demo deployment (free tier).
# Demo / manual-QA only — not for real production ERP data.
#
# Usage: in the Render dashboard choose "New +" > "Blueprint", point it at this
# repo/branch, and Render reads this file. Or configure a Web Service manually
# using the build/start commands below (see docs/deployment/render_demo.md).
services:
  - type: web
    name: swifpro-bi-demo
    runtime: python
    plan: free
    branch: main
    # collectstatic + migrate + admin bootstrap run at build so the app is ready
    # on first boot. bootstrap_demo_admins is a no-op unless its env vars are set.
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py bootstrap_demo_admins"
    startCommand: "gunicorn swifpro_bi.wsgi:application"
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: DJANGO_DEBUG
        value: "0"                       # production mode (DEBUG off)
      - key: DJANGO_SECRET_KEY
        generateValue: true              # Render generates a strong secret; never hardcoded
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"           # leading-dot wildcard matches the assigned *.onrender.com host
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DJANGO_DB_SSL_REQUIRE
        value: "0"                        # internal Render DB network; set 1 only for external connections
      - key: DATABASE_URL
        fromDatabase:
          name: swifpro-bi-db
          property: connectionString
      # --- Demo admin bootstrap (see docs/deployment/render_demo.md) ---
      # Passwords are NOT committed: set them in the Render dashboard.
      - key: DJANGO_SUPERUSER_USERNAME
        value: "santhosh"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "santhoshkumarnanubala@gmail.com"
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false                       # set a strong value in the Render dashboard
      - key: DEMO_ADMINS_ENABLED
        value: "1"                        # set to 0 to create only the owner
      - key: DEMO_ADMIN_DEFAULT_PASSWORD
        sync: false                       # set in the dashboard to enable the 4 demo admins
      - key: DEMO_ADMIN_1_EMAIL
        value: "admin1@swifpro.demo"
      - key: DEMO_ADMIN_2_EMAIL
        value: "admin2@swifpro.demo"
      - key: DEMO_ADMIN_3_EMAIL
        value: "admin3@swifpro.demo"
      - key: DEMO_ADMIN_4_EMAIL
        value: "admin4@swifpro.demo"

databases:
  - name: swifpro-bi-db
    plan: free
    databaseName: swifpro_bi
    user: swifpro_bi
